# Bump version in pubspec.yaml (major, minor, or hotfix), push to main, then create a GitHub Release.
name: Bump and Publish

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - hotfix
        default: "minor"

jobs:
  bump:
    name: Bump version and push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_tag: ${{ steps.bump_version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in pubspec
        id: bump_version
        run: |
          set -euo pipefail
          BUMP="${{ github.event.inputs.bump_type }}"
          PUB=$(grep -E '^version:\s*' pubspec.yaml | head -n1 | awk '{print $2}')
          SEMVER="${PUB%%+*}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$SEMVER"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            hotfix)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Unexpected bump_type: $BUMP"
              exit 1
              ;;
          esac

          NEW_SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          NEW_VERSION="${NEW_SEMVER}+1"
          echo "version_tag=v${NEW_SEMVER}" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git diff --staged --quiet && exit 0 || true
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }}"
          git push origin HEAD:main

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: [bump]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable desktop targets
        run: flutter config --enable-windows-desktop --enable-macos-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: flutter build windows --release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $id = "${{ needs.bump.outputs.version_tag }}"
          $out = "ev_bet_calculator-windows-x64-$id.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $out -Force

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: flutter build macos --release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/ev_bet_calculator.app" \
            "ev_bet_calculator-macos-${{ needs.bump.outputs.version_tag }}.zip"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ev_bet_calculator-${{ runner.os }}-${{ needs.bump.outputs.version_tag }}
          path: |
            *.zip

  build-linux:
    name: Build Linux (release bundle)
    needs: [bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle (.tar.gz)
        run: |
          set -euo pipefail
          cd build/linux/x64/release
          tar -czf ../../../../ev_bet_calculator-linux-x64-${{ needs.bump.outputs.version_tag }}.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: ev_bet_calculator-Linux-${{ needs.bump.outputs.version_tag }}
          path: |
            ev_bet_calculator-linux-x64-*.tar.gz

  build-android:
    name: Build Android (debug APK)
    needs: [bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Rename APK with version
        run: |
          set -euo pipefail
          cp build/app/outputs/flutter-apk/app-debug.apk \
             ev_bet_calculator-android-debug-${{ needs.bump.outputs.version_tag }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: ev_bet_calculator-Android-debug-${{ needs.bump.outputs.version_tag }}
          path: |
            ev_bet_calculator-android-debug-*.apk

  release:
    name: Create GitHub Release
    needs: [bump, build-desktop, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Compute prerelease flag
        id: pre
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.bump.outputs.version_tag }}"
          if [[ "$TAG" =~ ^v0\.[0-9]+\.[0-9]+([\-].+)?$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.version_tag }}
          generate_release_notes: true
          prerelease: ${{ steps.pre.outputs.is_prerelease }}
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.apk
