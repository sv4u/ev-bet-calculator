# Build artifacts on every push to main (no release). Use Publish or Bump and Publish for releases.
name: Build Artifacts

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Compute build identifier
        id: build_id
        shell: bash
        run: echo "id=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable desktop targets
        run: flutter config --enable-windows-desktop --enable-macos-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: flutter build windows --release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $id = "${{ steps.build_id.outputs.id }}"
          $out = "ev_bet_calculator-windows-x64-$id.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $out -Force

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: flutter build macos --release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/ev_bet_calculator.app" \
            "ev_bet_calculator-macos-${{ steps.build_id.outputs.id }}.zip"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ev_bet_calculator-${{ runner.os }}-${{ steps.build_id.outputs.id }}
          path: |
            *.zip

  build-linux:
    name: Build Linux (release bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute build identifier
        id: build_id
        run: echo "id=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle (.tar.gz)
        run: |
          set -euo pipefail
          cd build/linux/x64/release
          tar -czf ../../../../ev_bet_calculator-linux-x64-${{ steps.build_id.outputs.id }}.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ev_bet_calculator-Linux-${{ steps.build_id.outputs.id }}
          path: |
            ev_bet_calculator-linux-x64-*.tar.gz

  build-android:
    name: Build Android (debug APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute build identifier
        id: build_id
        run: echo "id=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Rename APK with build id
        run: |
          set -euo pipefail
          cp build/app/outputs/flutter-apk/app-debug.apk \
             ev_bet_calculator-android-debug-${{ steps.build_id.outputs.id }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ev_bet_calculator-Android-debug-${{ steps.build_id.outputs.id }}
          path: |
            ev_bet_calculator-android-debug-*.apk
