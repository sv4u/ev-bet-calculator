# Create a GitHub Release from the current pubspec.yaml version (no version bump).
name: Publish

on:
  workflow_dispatch: {}

jobs:
  get-version:
    name: Read version from pubspec
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.read.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: read
        run: |
          set -euo pipefail
          PUB=$(grep -E '^version:\s*' pubspec.yaml | head -n1 | awk '{print $2}')
          SEMVER="${PUB%%+*}"
          echo "version_tag=v${SEMVER}" >> $GITHUB_OUTPUT

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: [get-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable desktop targets
        run: flutter config --enable-windows-desktop --enable-macos-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: flutter build windows --release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $id = "${{ needs.get-version.outputs.version_tag }}"
          $out = "ev_bet_calculator-windows-x64-$id.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $out -Force

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: flutter build macos --release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/ev_bet_calculator.app" \
            "ev_bet_calculator-macos-${{ needs.get-version.outputs.version_tag }}.zip"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ev_bet_calculator-${{ runner.os }}-${{ needs.get-version.outputs.version_tag }}
          path: |
            *.zip

  build-linux:
    name: Build Linux (release bundle)
    needs: [get-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle (.tar.gz)
        run: |
          set -euo pipefail
          cd build/linux/x64/release
          tar -czf ../../../../ev_bet_calculator-linux-x64-${{ needs.get-version.outputs.version_tag }}.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ev_bet_calculator-Linux-${{ needs.get-version.outputs.version_tag }}
          path: |
            ev_bet_calculator-linux-x64-*.tar.gz

  build-android:
    name: Build Android (debug APK)
    needs: [get-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Rename APK with version
        run: |
          set -euo pipefail
          cp build/app/outputs/flutter-apk/app-debug.apk \
             ev_bet_calculator-android-debug-${{ needs.get-version.outputs.version_tag }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ev_bet_calculator-Android-debug-${{ needs.get-version.outputs.version_tag }}
          path: |
            ev_bet_calculator-android-debug-*.apk

  release:
    name: Create GitHub Release
    needs: [get-version, build-desktop, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute prerelease flag
        id: pre
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.get-version.outputs.version_tag }}"
          if [[ "$TAG" =~ ^v0\.[0-9]+\.[0-9]+([\-].+)?$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version_tag }}
          generate_release_notes: true
          prerelease: ${{ steps.pre.outputs.is_prerelease }}
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.apk
